<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top left,#8b5cf6 0%,transparent 35%),
        radial-gradient(circle at bottom right,#2563eb 0%,transparent 35%),
        #08090f;

    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#8b5cf6;
    filter:blur(180px);
    opacity:.25;
    top:-200px;
    left:-200px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#2563eb;
    filter:blur(180px);
    opacity:.25;
    bottom:-200px;
    right:-200px;
}

.card{
    position:relative;
    z-index:2;

    width:92%;
    max-width:460px;

    padding:24px;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border-radius:28px;

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
        0 20px 60px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.1);

    text-align:center;

    animation:cardFloat 5s ease-in-out infinite;
}

.profile{
    width:120px;
    height:120px;

    margin:0 auto 15px;

    border-radius:50%;
    overflow:hidden;

    border:3px solid rgba(255,255,255,.25);

    box-shadow:0 0 35px rgba(139,92,246,.6);

    animation:pulse 4s ease-in-out infinite;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    color:white;
    font-size:1.7rem;
    font-weight:700;
    margin-bottom:8px;
}

.subtitle{
    color:#cfcfcf;
    font-size:.95rem;
    margin-bottom:22px;
    line-height:1.5;
}

.links{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.link-btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;

    width:100%;

    padding:14px;

    border-radius:16px;

    text-decoration:none;
    color:white;

    font-weight:600;
    font-size:1rem;

    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);

    transition:.25s;
}

.link-btn i{
    font-size:20px;
}

.link-btn:hover{
    transform:translateY(-2px);
}

.instagram:hover{
    background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045);
}

.tiktok:hover{
    background:#000;
}

.youtube:hover{
    background:#ff0000;
}

.facebook:hover{
    background:#1877f2;
}

.phone:hover{
    background:#25D366;
}

.footer{
    margin-top:18px;
    color:rgba(255,255,255,.55);
    font-size:.8rem;
    letter-spacing:.5px;
}

@keyframes pulse{

    0%{
        box-shadow:
        0 0 20px rgba(139,92,246,.4),
        0 0 40px rgba(139,92,246,.2);
    }

    50%{
        box-shadow:
        0 0 40px rgba(139,92,246,.8),
        0 0 80px rgba(139,92,246,.4);
    }

    100%{
        box-shadow:
        0 0 20px rgba(139,92,246,.4),
        0 0 40px rgba(139,92,246,.2);
    }

}

@keyframes cardFloat{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-6px);
    }

}

@media(max-width:500px){

    .card{
        width:94%;
        padding:22px;
    }

    .profile{
        width:110px;
        height:110px;
    }

    h1{
        font-size:1.6rem;
    }

    .link-btn{
        padding:13px;
    }
}

</style>
