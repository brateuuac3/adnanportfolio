<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050505;
  color:white;
  overflow-x:hidden;
}

.hero{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.68),rgba(0,0,0,.9)),
    url('https://scontent-fra5-2.xx.fbcdn.net/v/t39.30808-6/586538326_3973863399412885_7061474985701962659_n.jpg?stp=dst-jpg_tt6&cstp=mx1439x1447&ctp=s1439x1447&_nc_cat=106&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=WjhQ0R_A068Q7kNvwEpiAcI&_nc_oc=AdpxZW2qKpqQ1_4xWyU4XdLSN188VmN7wMFUCMeVBicVNTF5ZJ04JpjUDBjjQxHmkYw&_nc_zt=23&_nc_ht=scontent-fra5-2.xx&_nc_gid=H1vjq0sBIffCQAVS8o_MvQ&_nc_ss=7b2a8&oh=00_Af-lwCtICyNSu1IEP8p_LFxJbdTd28y_7oxgTNhujiDZvQ&oe=6A38A2EB');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.profile{
  text-align:center;
  padding-top:35px;
}

.profile img{
  width:140px;
  height:140px;
  object-fit:cover;
  border-radius:50%;
  border:4px solid rgba(255,255,255,.16);
  box-shadow:0 0 25px rgba(215,190,120,.5);
  animation:pulse 4s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 20px rgba(215,190,120,.3);}
  50%{box-shadow:0 0 50px rgba(215,190,120,.8);}
  100%{box-shadow:0 0 20px rgba(215,190,120,.3);}
}

h1{
  font-size:3rem;
  margin-top:18px;
  font-weight:800;
}

.subtitle{
  margin-top:10px;
  color:#d8d8d8;
  line-height:1.8;
}

.whatsapp-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  text-decoration:none;
  margin:32px auto 22px;
  max-width:650px;
  padding:22px;
  border-radius:20px;
  background:linear-gradient(135deg,#d8c29a,#c9a86a);
  color:black;
  font-size:1.2rem;
  font-weight:700;
  transition:.3s;
}

.whatsapp-btn:hover{
  transform:translateY(-4px);
}

.links{
  display:grid;
  grid-template-columns:repeat(2,1fr);
