}

.link:hover{transform:translateY(-3px);border-color:#d8c29a;}
.link i{display:block;font-size:28px;margin-bottom:10px;}

.video-section{padding-top:70px;}
.section-title{text-align:center;margin-bottom:20px;font-size:1.4rem;color:#d8c29a;}

.video-card{
background:rgba(255,255,255,.05);

padding:15px;
overflow:hidden;
}

.footer{text-align:center;margin-top:40px;color:#999;padding-bottom:30px;}

@media(max-width:768px){
