<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adnan Solak | Official</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top left,#8b5cf6 0%,transparent 35%),
        radial-gradient(circle at bottom right,#2563eb 0%,transparent 35%),
        #08090f;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:#8b5cf6;
    filter:blur(180px);
    opacity:.25;
    top:-200px;
    left:-200px;
}

body::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:#2563eb;
    filter:blur(180px);
    opacity:.25;
    bottom:-200px;
    right:-200px;
}

.card{
    position:relative;
    z-index:2;

    width:95%;
    max-width:520px;

    padding:35px;

    border-radius:30px;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
        0 20px 60px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.15);

    text-align:center;
}

.profile{
    width:150px;
    height:150px;

    margin:auto;
    margin-bottom:20px;

    border-radius:50%;
    overflow:hidden;

    border:3px solid rgba(255,255,255,.25);

    box-shadow:
        0 0 40px rgba(139,92,246,.6);
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.4s;
}

.profile:hover img{
    transform:scale(1.08);
}

h1{
    color:white;
    font-size:2rem;
    margin-bottom:5px;
}

.subtitle{
    color:#d1d5db;
    margin-bottom:10px;
}

.description{
    color:#9ca3af;
    line-height:1.6;
    margin-bottom:30px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.link-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    padding:16px;

    border-radius:18px;

    text-decoration:none;
    color:white;

    font-weight:600;

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);

    transition:.3s;
}

.link-btn i{
    font-size:22px;
}

.link-btn:hover{
    transform:translateY(-4px);
}

.instagram:hover{
    background:linear-gradient(
        45deg,
        #833ab4,
        #fd1d1d,
        #fcb045
    );
}

.tiktok:hover{
    background:#000;
}

.youtube:hover{
    background:#ff0000;
}

.facebook:hover{
    background:#1877f2;
}

.footer{
    margin-top:25px;
    color:#6b7280;
    font-size:.85rem;
}

@media(max-width:550px){

.card{
    padding:25px;
}

.profile{
    width:130px;
    height:130px;
}

h1{
    font-size:1.7rem;
}

}

</style>
</head>

<body>

<div class="card">

    <div class="profile">
        <img src="https://scontent-vie1-1.xx.fbcdn.net/v/t39.30808-6/586538326_3973863399412885_7061474985701962659_n.jpg?stp=dst-jpg_tt6&cstp=mx1439x1447&ctp=s1439x1447&_nc_cat=106&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=WjhQ0R_A068Q7kNvwGiLhCB&_nc_oc=Adq5DUhi4FgpXS0Td73hXFZ69SOEnjmnvIwH2NNcyu8KcUa3LtKMS0rRbtzkklYMH5Q&_nc_zt=23&_nc_ht=scontent-vie1-1.xx&_nc_gid=WmvCD5d1HXz63FVLzvVJVw&_nc_ss=792a8&oh=00_Af85pVS3g4O3KN5SFGY33NMwo66O-i3y8aL_cdkhAjWZlg&oe=6A38326B"
             alt="Adnan Solak">
    </div>

    <h1>Adnan Solak</h1>

    <div class="subtitle">
        🎤 Sänger • Live Musik • Events
    </div>

    <div class="description">
        Live Musik für Hochzeiten, Geburtstage,
        Firmenfeiern und besondere Anlässe.
    </div>

    <div class="links">

        <a class="link-btn instagram"
           href="https://www.instagram.com/adnan.solak.official/"
           target="_blank">
            <i class="fa-brands fa-instagram"></i>
            Instagram
        </a>

        <a class="link-btn tiktok"
           href="https://www.tiktok.com/@adnan.solak.official"
           target="_blank">
            <i class="fa-brands fa-tiktok"></i>
            TikTok
        </a>

        <a class="link-btn youtube"
           href="https://www.youtube.com/@adnan.solak.official"
           target="_blank">
            <i class="fa-brands fa-youtube"></i>
            YouTube
        </a>

        <a class="link-btn facebook"
           href="https://www.facebook.com/adnan.solakofficial/"
           target="_blank">
            <i class="fa-brands fa-facebook-f"></i>
            Facebook
        </a>

    </div>

    <div class="footer">
        © Adnan Solak Official
    </div>

</div>

</body>
</html>
